<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conexión Musical - Galería de Artistas</title>
    <link rel="stylesheet" href="css/estilos.css" />
  </head>
  <body>
    <header>
      <h1>Conexión Musical</h1>
      <div class="buscador-caja">
        <label for="buscar">Buscar artista por género:</label>
        <input
          id="buscar"
          type="text"
          placeholder="Ej: Reggaeton, Trap, Tech..."
        />
      </div>
    </header>

    <main>
      <div class="control-acciones">
        <button id="cargar">Cargar Artistas</button>
      </div>

      <section id="galeria"></section>
    </main>

    <footer>
      <p>Desarrollado para Desafío Front End &copy; 2026</p>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
